apiVersion: apps/v1
kind: Deployment
metadata:
    name: worker-ocr-gpu
spec:
    replicas: 0
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: worker-ocr-gpu
    template:
        metadata:
            labels:
                app: worker-ocr-gpu
        spec:
            nodeSelector:
                workload: ml-gpu

            tolerations:
                - key: "dedicated"
                  operator: "Equal"
                  value: "ml-gpu"
                  effect: "NoSchedule"

            containers:
                - name: worker
                  image: __OCR_WORKER_VERSION__
                  env:
                      - name: OCR_DPI
                        value: "150"
                      - name: OCR_CONCURRENCY
                        value: "2"

                  resources:
                      limits:
                          nvidia.com/gpu: "1"
                          memory: "15Gi"
                          cpu: "3"
                      requests:
                          memory: "15Gi"
                          cpu: "2"

                  livenessProbe:
                      httpGet:
                          path: /live
                          port: 8000
                      initialDelaySeconds: 20
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3

                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
    name: worker-ocr-gpu-service
    namespace: ns
spec:
    type: ClusterIP
    selector:
        app: worker-ocr-gpu
    ports:
        - name: grpc
          port: 50051
          targetPort: 50051
        - name: http
          port: 8000
          targetPort: 8000
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: worker-ocr-scaler
spec:
    scaleTargetRef:
        name: worker-ocr-gpu

    pollingInterval: 5
    cooldownPeriod: 180

    minReplicaCount: 0
    maxReplicaCount: 1

    triggers:
        - type: metrics-api
          metadata:
              targetValue: "1"
              url: "http://backend-app-service.neurochar.svc.cluster.local:9090/metrics/shoud-gpu-nodes"
              valueLocation: "value"
              format: "json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: worker-ocr-cpu
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: worker-ocr-cpu
    template:
        metadata:
            labels:
                app: worker-ocr-cpu

        spec:
            containers:
                - name: worker
                  image: __OCR_WORKER_VERSION__
                  env:
                      - name: OCR_DPI
                        value: "150"
                      - name: OCR_CONCURRENCY
                        value: "1"

                  resources:
                      limits:
                          memory: "6Gi"
                          cpu: "2.5"
                      requests:
                          memory: "5Gi"
                          cpu: "2.5"

                  livenessProbe:
                      httpGet:
                          path: /live
                          port: 8000
                      initialDelaySeconds: 20
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3

                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
    name: worker-ocr-cpu-service
    namespace: ns
spec:
    type: ClusterIP
    selector:
        app: worker-ocr-cpu
    ports:
        - name: grpc
          port: 50051
          targetPort: 50051
        - name: http
          port: 8000
          targetPort: 8000
